<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="calculator">

    <div class="display">
      <div id="expression"></div>
      <div id="result">0</div>
    </div>

    <div class="buttons">
      <button class="btn gray" onclick="clearAll()">AC</button>
      <button class="btn gray" onclick="deleteLast()">⌫</button>
      <button class="btn gray" onclick="appendVal('%')">%</button>
      <button class="btn orange" onclick="appendVal('/')">÷</button>

      <button class="btn" onclick="appendVal('7')">7</button>
      <button class="btn" onclick="appendVal('8')">8</button>
      <button class="btn" onclick="appendVal('9')">9</button>
      <button class="btn orange" onclick="appendVal('*')">×</button>

      <button class="btn" onclick="appendVal('4')">4</button>
      <button class="btn" onclick="appendVal('5')">5</button>
      <button class="btn" onclick="appendVal('6')">6</button>
      <button class="btn orange" onclick="appendVal('-')">−</button>

      <button class="btn" onclick="appendVal('1')">1</button>
      <button class="btn" onclick="appendVal('2')">2</button>
      <button class="btn" onclick="appendVal('3')">3</button>
      <button class="btn orange" onclick="appendVal('+')">+</button>

      <button class="btn wide" onclick="appendVal('0')">0</button>
      <button class="btn" onclick="appendVal('.')">.</button>
      <button class="btn orange" onclick="calculate()">=</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
